<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rysa AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
</head>

<body>
    <main class="shell">
        <section class="hero">
            <div class="brand-pill">Rysa AI</div>
            <h1>Aprenda programar de forma ludica e simples..</h1>
            <p>Digite sua pergunta abaixo e veja a resposta aparecer no painel de conversa.</p>
        </section>

        <section class="chat-card" aria-label="Área de conversa">
            <header class="chat-header">
                <div>
                    <span class="status-dot"></span>
                    <strong>Rysa AI</strong>
                </div>
                <span class="subtitle">Pronta para responder</span>
            </header>

            <div id="chatMessages" class="chat-messages" aria-live="polite" aria-relevant="additions text"></div>

            <form id="chatForm" class="composer">
                <label class="sr-only" for="userPrompt">Escreva sua pergunta</label>
                <textarea id="userPrompt" name="prompt" rows="1" placeholder="Pergunte algo como: o que é uma variável?"
                    autocomplete="off"></textarea>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
